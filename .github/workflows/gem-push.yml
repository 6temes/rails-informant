name: Publish Gem

on:
  push:
    tags: ["v*"]

jobs:
  push:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74 # v1
        with:
          ruby-version: "4.0"

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # gem build reads the version from the gemspec (RAILS_INFORMANT_VERSION),
      # bypassing bundler so the dev-pinned Gemfile.lock doesn't trip frozen mode.
      - name: Configure RubyGems credentials
        uses: rubygems/configure-rubygems-credentials@bc6dd217f8a4f919d6835fcfefd470ef821f5c44 # v1.0.0

      - name: Build and push gem
        env:
          RAILS_INFORMANT_VERSION: ${{ steps.version.outputs.version }}
        run: |
          gem build rails-informant.gemspec
          gem push "rails-informant-${RAILS_INFORMANT_VERSION}.gem"
